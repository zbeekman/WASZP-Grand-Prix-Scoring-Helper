name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: raven-actions/actionlint@v2

  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y python3-tk

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install actionlint
        run: |
          curl -sL "$(curl -sL https://api.github.com/repos/rhysd/actionlint/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_amd64.*tar.gz")) | .browser_download_url')" \
            | tar xz -C "$HOME/.local/bin" actionlint
        shell: bash

      - name: Tests (pytest — includes lint, type-check, and actionlint)
        run: >
          uv run pytest
          --cov=waszp_gp_scorer --cov-report=term-missing --cov-report=xml
          --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml
          report_type: test_results
