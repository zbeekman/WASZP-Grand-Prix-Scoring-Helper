  <rect x="36" y="446" width="568" height="28" fill="#FAFAFA"/>
  <text x="60"  y="464" text-anchor="middle" font-size="11" fill="#AEAEB2">2</text>
  <text x="112" y="464" text-anchor="middle" font-size="13" font-weight="700" fill="#0088AA">2763</text>
  <text x="210" y="464" text-anchor="middle" font-size="12" fill="#0088AA">Carter, T.</text>
  <text x="316" y="464" text-anchor="middle" font-size="12" fill="#0088AA">USA</text>
  <text x="384" y="464" text-anchor="middle" font-size="12" fill="#0088AA">8.2</text>
  <rect x="526" y="449" width="56" height="20" rx="3" fill="white" stroke="#D1D1D6" stroke-width="0.8"/>
  <text x="554" y="463" text-anchor="middle" font-size="12" font-weight="600" fill="#AEAEB2">1st</text>

  <!-- ── Row 3: 2451, 1st rounding
       2451 ends up with 2 roundings → dark blue text on white bg ── -->
  <rect x="36" y="474" width="568" height="28" fill="white"/>
  <text x="60"  y="492" text-anchor="middle" font-size="11" fill="#AEAEB2">3</text>
  <text x="112" y="492" text-anchor="middle" font-size="13" font-weight="700" fill="#0088AA">2451</text>
  <text x="210" y="492" text-anchor="middle" font-size="12" fill="#0088AA">Brooks, E.</text>
  <text x="316" y="492" text-anchor="middle" font-size="12" fill="#0088AA">CAN</text>
  <text x="384" y="492" text-anchor="middle" font-size="12" fill="#0088AA">7.5</text>
  <rect x="526" y="477" width="56" height="20" rx="3" fill="white" stroke="#D1D1D6" stroke-width="0.8"/>
  <text x="554" y="491" text-anchor="middle" font-size="12" font-weight="600" fill="#AEAEB2">1st</text>

  <!-- ── Row 4: 3198, 1st rounding
       3198 has ONLY 1 rounding → default black text. Contrast with rows 1–3. ── -->
  <rect x="36" y="502" width="568" height="28" fill="#FAFAFA"/>
  <text x="60"  y="520" text-anchor="middle" font-size="11" fill="#AEAEB2">4</text>
  <text x="112" y="520" text-anchor="middle" font-size="13" font-weight="700" fill="#1C1C1E">3198</text>
  <text x="210" y="520" text-anchor="middle" font-size="12" fill="#3C3C43">Fischer, L.</text>
  <text x="316" y="520" text-anchor="middle" font-size="12" fill="#3C3C43">CAN</text>
  <text x="384" y="520" text-anchor="middle" font-size="12" fill="#3C3C43">7.5</text>
  <rect x="526" y="505" width="56" height="20" rx="3" fill="white" stroke="#D1D1D6" stroke-width="0.8"/>
  <text x="554" y="519" text-anchor="middle" font-size="12" font-weight="600" fill="#AEAEB2">1st</text>

  <!-- ── Row 5: 4017, 2nd rounding → blue BG + dark green text (3 total) ── -->
  <rect x="36" y="530" width="568" height="28" fill="#66D9FF"/>
  <text x="60"  y="548" text-anchor="middle" font-size="11" fill="#007090">5</text>
  <text x="112" y="548" text-anchor="middle" font-size="13" font-weight="700" fill="#5A9900">4017</text>
  <text x="210" y="548" text-anchor="middle" font-size="12" fill="#5A9900">Carter, J.</text>
  <text x="316" y="548" text-anchor="middle" font-size="12" fill="#5A9900">USA</text>
  <text x="384" y="548" text-anchor="middle" font-size="12" fill="#5A9900">8.2</text>
  <rect x="526" y="533" width="56" height="20" rx="3" fill="#00BFFF" fill-opacity="0.35"/>
  <text x="554" y="547" text-anchor="middle" font-size="12" font-weight="700" fill="#00304A">2nd</text>

  <!-- ── Row 6: 2763, 2nd rounding → blue BG + dark blue text (2 total) ── -->
  <rect x="36" y="558" width="568" height="28" fill="#66D9FF"/>
  <text x="60"  y="576" text-anchor="middle" font-size="11" fill="#007090">6</text>
  <text x="112" y="576" text-anchor="middle" font-size="13" font-weight="700" fill="#0088AA">2763</text>
  <text x="210" y="576" text-anchor="middle" font-size="12" fill="#0088AA">Carter, T.</text>
  <text x="316" y="576" text-anchor="middle" font-size="12" fill="#0088AA">USA</text>
  <text x="384" y="576" text-anchor="middle" font-size="12" fill="#0088AA">8.2</text>
  <rect x="526" y="561" width="56" height="20" rx="3" fill="#00BFFF" fill-opacity="0.35"/>
  <text x="554" y="575" text-anchor="middle" font-size="12" font-weight="700" fill="#00304A">2nd</text>

  <!-- ── Row 7: 4017, 3rd rounding → green BG + dark green text (3 total) ── -->
  <rect x="36" y="586" width="568" height="28" fill="#CCFF66"/>
  <text x="60"  y="604" text-anchor="middle" font-size="11" fill="#4A7A00">7</text>
  <text x="112" y="604" text-anchor="middle" font-size="13" font-weight="700" fill="#5A9900">4017</text>
  <text x="210" y="604" text-anchor="middle" font-size="12" fill="#5A9900">Carter, J.</text>
  <text x="316" y="604" text-anchor="middle" font-size="12" fill="#5A9900">USA</text>
  <text x="384" y="604" text-anchor="middle" font-size="12" fill="#5A9900">8.2</text>
  <rect x="526" y="589" width="56" height="20" rx="3" fill="#AAEE44" fill-opacity="0.5"/>
  <text x="554" y="603" text-anchor="middle" font-size="12" font-weight="700" fill="#2A4A00">3rd</text>

  <!-- ── Row 8: 2451, 2nd rounding → blue BG + dark blue text (2 total) ── -->
  <rect x="36" y="614" width="568" height="28" fill="#66D9FF"/>
  <text x="60"  y="632" text-anchor="middle" font-size="11" fill="#007090">8</text>
  <text x="112" y="632" text-anchor="middle" font-size="13" font-weight="700" fill="#0088AA">2451</text>
  <text x="210" y="632" text-anchor="middle" font-size="12" fill="#0088AA">Brooks, E.</text>
  <text x="316" y="632" text-anchor="middle" font-size="12" fill="#0088AA">CAN</text>
  <text x="384" y="632" text-anchor="middle" font-size="12" fill="#0088AA">7.5</text>
  <rect x="526" y="617" width="56" height="20" rx="3" fill="#00BFFF" fill-opacity="0.35"/>
  <text x="554" y="631" text-anchor="middle" font-size="12" font-weight="700" fill="#00304A">2nd</text>

  <!-- bottom fade -->
  <defs>
    <linearGradient id="fadeDown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.88"/>
    </linearGradient>
  </defs>
  <rect x="36" y="614" width="568" height="28" fill="url(#fadeDown)"/>
  <text x="320" y="659" text-anchor="middle" font-size="11" fill="#AEAEB2">⋯ continues as boats complete more laps ⋯</text>

  <!-- footer -->
  <text x="320" y="688" text-anchor="middle" font-size="10.5" fill="#AEAEB2">3198 has 1 rounding → black text. Rows 1–3 have white bg but coloured text: those boats appear again later.</text>
  <text x="320" y="701" text-anchor="middle" font-size="10.5" fill="#AEAEB2">When row 7 (4017's 3rd) was entered, rows 1 and 5 retroactively switched from dark blue → dark green text.</text>

</svg>
